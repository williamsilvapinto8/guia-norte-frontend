<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guia Norte - Registrar</title>
    <!-- Bootstrap CSS via CDN -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmIS/fQp+1A6sF8WdKj3g3b" crossorigin="anonymous">
    <!-- Seu CSS personalizado -->
    <link rel="stylesheet" href="css/style.css">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }
        .card {
            width: 100%;
            max-width: 400px;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
        }
        .form-label {
            font-weight: 500;
        }
        .btn-primary {
            background-color: #007bff;
            border-color: #007bff;
        }
        .btn-primary:hover {
            background-color: #0056b3;
            border-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2 class="card-title text-center mb-4">Criar Conta no Guia Norte</h2>
        <form id="registerForm">
            <div class="mb-3">
                <label for="email" class="form-label">E-mail *</label>
                <input type="email" class="form-control" id="email" name="email" required>
            </div>
            <div class="mb-3">
                <label for="password" class="form-label">Senha *</label>
                <input type="password" class="form-control" id="password" name="password" required>
            </div>
            <div class="mb-3">
                <label for="passwordConfirm" class="form-label">Confirmar Senha *</label>
                <input type="password" class="form-control" id="passwordConfirm" name="passwordConfirm" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 mb-3">Registrar</button>
            <p class="text-center">Já tem uma conta? <a href="login.html">Faça login aqui</a></p>
            <div id="message" class="mt-3 text-center"></div>
        </form>
    </div>

    <!-- Bootstrap JS via CDN -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <!-- Seu JavaScript personalizado para o registro -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const registerForm = document.getElementById('registerForm');
            const messageDiv = document.getElementById('message');
            const API_BASE_URL = 'https://api.guianorte.cocrias.com.br/api'; // Usando HTTPS

            registerForm.addEventListener('submit', async (event) => {
                event.preventDefault();

                const email = document.getElementById('email').value;
                const password = document.getElementById('password').value;
                const passwordConfirm = document.getElementById('passwordConfirm').value;

                if (password !== passwordConfirm) {
                    messageDiv.innerHTML = '<div class="alert alert-danger">As senhas não coincidem.</div>';
                    return;
                }

                // O backend Django espera 'username' e 'email' com o mesmo valor para registro
                const payload = {
                    username: email, // Usando o email como username
                    email: email,
                    password: password,
                    password_confirm: passwordConfirm
                };

                try {
                    const response = await fetch(`${API_BASE_URL}/auth/register/`, {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify(payload)
                    });

                    const data = await response.json();

                    if (response.ok) {
                        messageDiv.innerHTML = '<div class="alert alert-success">Conta criada com sucesso! Redirecionando para o login...</div>';
                        // Após o registro, redireciona para a página de login
                        setTimeout(() => {
                            window.location.href = 'login.html';
                        }, 2000);
                    } else {
                        // Exibe erros do backend
                        let errorMessage = 'Erro ao registrar. Verifique os dados.';
                        if (data.email) {
                            errorMessage += `<br>- E-mail: ${data.email.join(', ')}`;
                        }
                        if (data.username) {
                            errorMessage += `<br>- Nome de usuário: ${data.username.join(', ')}`;
                        }
                        if (data.password) {
                            errorMessage += `<br>- Senha: ${data.password.join(', ')}`;
                        }
                        if (data.password_confirm) {
                            errorMessage += `<br>- Confirmação de senha: ${data.password_confirm.join(', ')}`;
                        }
                        messageDiv.innerHTML = `<div class="alert alert-danger">${errorMessage}</div>`;
                        console.error('Erro de registro:', data);
                    }
                } catch (error) {
                    messageDiv.innerHTML = '<div class="alert alert-danger">Ocorreu um erro de rede. Tente novamente.</div>';
                    console.error('Erro de rede:', error);
                }
            });
        });
    </script>
</body>
</html>
